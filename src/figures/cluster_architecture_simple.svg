<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="720" viewBox="0 0 1300 720"
     font-family="FreeSans, Arial, sans-serif">

  <!-- Background -->
  <rect width="1300" height="720" fill="white"/>

  <!-- Arrowhead definitions (placed before any use) -->
  <defs>
    <marker id="aB" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#326CE5"/>
    </marker>
    <marker id="aBs" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 9 3.5, 0 7" fill="#326CE5"/>
    </marker>
    <marker id="aG" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2d7d32"/>
    </marker>
    <marker id="aO" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="650" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">Basic Kubernetes Cluster</text>

  <!-- ===================================================
       CONTROL PLANE (left large box)
       =================================================== -->
  <rect x="18" y="52" width="760" height="652" rx="10" fill="#EBF0FC" stroke="#326CE5" stroke-width="2.5"/>
  <text x="38" y="76" font-size="15" font-weight="bold" fill="#326CE5">CONTROL PLANE</text>
  <text x="38" y="92" font-size="10" fill="#888" font-style="italic">(also a node — runs kubelet + container runtime)</text>

  <!-- - - Static Pods section (dashed) - - -->
  <rect x="36" y="102" width="724" height="310" rx="7"
        fill="#D9E8FC" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="52" y="122" font-size="12" font-weight="bold" fill="#326CE5">Static Pods</text>
  <text x="52" y="137" font-size="9" fill="#555" font-style="italic">/etc/kubernetes/manifests/</text>

  <!-- kube-apiserver (central, prominent) -->
  <rect x="270" y="146" width="220" height="86" rx="7"
        fill="#326CE5" stroke="#1a4aaa" stroke-width="2"/>
  <text x="380" y="181" text-anchor="middle" font-size="15" font-weight="bold" fill="white">kube-apiserver</text>
  <text x="380" y="199" text-anchor="middle" font-size="9.5" fill="#cce0ff">central hub</text>
  <text x="380" y="213" text-anchor="middle" font-size="8.5" fill="#cce0ff">kube-apiserver.yaml</text>

  <!-- etcd -->
  <rect x="52" y="156" width="160" height="78" rx="6"
        fill="white" stroke="#326CE5" stroke-width="1.5"/>
  <text x="132" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#326CE5">etcd</text>
  <text x="132" y="206" text-anchor="middle" font-size="9" fill="#555">key-value store</text>
  <text x="132" y="220" text-anchor="middle" font-size="8" fill="#888">etcd.yaml</text>

  <!-- kube-controller-manager -->
  <rect x="548" y="148" width="196" height="82" rx="6"
        fill="white" stroke="#326CE5" stroke-width="1.5"/>
  <text x="646" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="#326CE5">kube-controller</text>
  <text x="646" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#326CE5">-manager</text>
  <text x="646" y="212" text-anchor="middle" font-size="8" fill="#888">kube-controller-manager.yaml</text>

  <!-- kube-scheduler -->
  <rect x="548" y="256" width="196" height="78" rx="6"
        fill="white" stroke="#326CE5" stroke-width="1.5"/>
  <text x="646" y="289" text-anchor="middle" font-size="13" font-weight="bold" fill="#326CE5">kube-scheduler</text>
  <text x="646" y="307" text-anchor="middle" font-size="8" fill="#888">kube-scheduler.yaml</text>

  <!-- cloud-controller-manager (optional, shown as pod too) -->
  <rect x="52" y="268" width="160" height="78" rx="6"
        fill="white" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="132" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#326CE5">cloud-controller</text>
  <text x="132" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="#326CE5">-manager</text>
  <text x="132" y="330" text-anchor="middle" font-size="8" fill="#888">(optional)</text>

  <!-- Arrows: apiserver <-> etcd -->
  <line x1="270" y1="182" x2="212" y2="182" stroke="#326CE5" stroke-width="1.8"
        marker-end="url(#aB)" marker-start="url(#aBs)"/>

  <!-- Arrows: apiserver -> cloud-controller-manager -->
  <line x1="308" y1="232" x2="213" y2="293" stroke="#326CE5" stroke-width="1.5"
        marker-end="url(#aB)" marker-start="url(#aBs)"/>

  <!-- Arrows: apiserver <-> kube-controller-manager -->
  <line x1="490" y1="182" x2="548" y2="182" stroke="#326CE5" stroke-width="1.8"
        marker-end="url(#aB)" marker-start="url(#aBs)"/>

  <!-- Arrows: apiserver -> kube-scheduler -->
  <line x1="490" y1="210" x2="548" y2="278" stroke="#326CE5" stroke-width="1.5"
        marker-end="url(#aB)" marker-start="url(#aBs)"/>

  <!-- - - kubelet (on control plane node) - - -->
  <rect x="36" y="432" width="155" height="68" rx="6"
        fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="113" y="462" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">kubelet</text>
  <text x="113" y="479" text-anchor="middle" font-size="9" fill="#555">node agent</text>
  <text x="113" y="492" text-anchor="middle" font-size="8" fill="#888">(ctrl plane node)</text>

  <!-- kubelet -> Static Pods (orange dashed arrow up) -->
  <line x1="113" y1="432" x2="113" y2="416" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="113" y1="416" x2="380" y2="416" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="380" y1="416" x2="380" y2="412" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,2"
        marker-end="url(#aO)"/>
  <text x="230" y="412" text-anchor="middle" font-size="9" fill="#E65100" font-style="italic">creates &amp; monitors static pods</text>

  <!-- Container Runtime (ctrl plane) -->
  <rect x="212" y="432" width="190" height="68" rx="6"
        fill="#F5F5F5" stroke="#888" stroke-width="1.5"/>
  <text x="307" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Container Runtime</text>
  <text x="307" y="480" text-anchor="middle" font-size="9" fill="#666">e.g. containerd</text>
  <text x="307" y="494" text-anchor="middle" font-size="8" fill="#999">(runs static pod containers)</text>

  <!-- kubelet <-> Container Runtime -->
  <line x1="191" y1="466" x2="212" y2="466" stroke="#888" stroke-width="1.2"
        marker-end="url(#aO)" marker-start="url(#aBs)"/>

  <!-- /etc/kubernetes/manifests box -->
  <rect x="430" y="432" width="320" height="68" rx="6"
        fill="#FAFAFA" stroke="#BBB" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="590" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">/etc/kubernetes/manifests/</text>
  <text x="590" y="471" text-anchor="middle" font-size="9" fill="#777">kube-apiserver.yaml</text>
  <text x="590" y="485" text-anchor="middle" font-size="9" fill="#777">etcd.yaml  |  kube-scheduler.yaml  |  kube-controller-manager.yaml</text>

  <!-- kubelet reads manifests -->
  <line x1="191" y1="480" x2="430" y2="475" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"
        marker-end="url(#aO)"/>
  <text x="310" y="495" text-anchor="middle" font-size="8.5" fill="#E65100" font-style="italic">reads</text>

  <!-- ===================================================
       WORKER NODE (right box)
       =================================================== -->
  <rect x="808" y="52" width="474" height="652" rx="10"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="2.5"/>
  <text x="828" y="76" font-size="15" font-weight="bold" fill="#2d7d32">NODE</text>
  <text x="828" y="92" font-size="10" fill="#888" font-style="italic">(worker node)</text>

  <!-- kubelet (worker) -->
  <rect x="826" y="102" width="185" height="76" rx="6"
        fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="918" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">kubelet</text>
  <text x="918" y="152" text-anchor="middle" font-size="9" fill="#555">node agent</text>
  <text x="918" y="166" text-anchor="middle" font-size="8" fill="#888">watches kube-apiserver</text>

  <!-- kube-proxy (worker) -->
  <rect x="1060" y="102" width="196" height="76" rx="6"
        fill="white" stroke="#2d7d32" stroke-width="1.5"/>
  <text x="1158" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d7d32">kube-proxy</text>
  <text x="1158" y="152" text-anchor="middle" font-size="9" fill="#555">network rules</text>
  <text x="1158" y="166" text-anchor="middle" font-size="8" fill="#888">iptables / ipvs</text>

  <!-- Container Runtime (worker) -->
  <rect x="826" y="202" width="430" height="60" rx="6"
        fill="#F5F5F5" stroke="#888" stroke-width="1.5"/>
  <text x="1041" y="229" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Container Runtime</text>
  <text x="1041" y="249" text-anchor="middle" font-size="9" fill="#666">e.g. containerd / CRI-O</text>

  <!-- kubelet -> Container Runtime -->
  <line x1="918" y1="178" x2="918" y2="202" stroke="#E65100" stroke-width="1.5"
        marker-end="url(#aO)"/>

  <!-- Pods group (dashed, worker) -->
  <rect x="820" y="285" width="444" height="400" rx="8"
        fill="#C8E6C9" stroke="#2d7d32" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="836" y="307" font-size="12" font-weight="bold" fill="#2d7d32">Pods</text>

  <!-- kubelet manages pods -->
  <line x1="918" y1="262" x2="918" y2="285" stroke="#E65100" stroke-width="1.5"
        marker-end="url(#aO)"/>
  <text x="928" y="278" font-size="9" fill="#E65100" font-style="italic">manages</text>

  <!-- Pod 1 -->
  <rect x="835" y="316" width="198" height="182" rx="6"
        fill="white" stroke="#2d7d32" stroke-width="1.5"/>
  <text x="934" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7d32">Pod</text>
  <!-- Container A -->
  <rect x="851" y="350" width="166" height="58" rx="4"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="1"/>
  <text x="934" y="378" text-anchor="middle" font-size="11" fill="#1b5e20">Container A</text>
  <text x="934" y="396" text-anchor="middle" font-size="8" fill="#666">app workload</text>
  <!-- Container B -->
  <rect x="851" y="420" width="166" height="58" rx="4"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="1"/>
  <text x="934" y="448" text-anchor="middle" font-size="11" fill="#1b5e20">Container B</text>
  <text x="934" y="466" text-anchor="middle" font-size="8" fill="#666">sidecar</text>

  <!-- Pod 2 -->
  <rect x="1050" y="316" width="198" height="182" rx="6"
        fill="white" stroke="#2d7d32" stroke-width="1.5"/>
  <text x="1149" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7d32">Pod</text>
  <!-- Container C -->
  <rect x="1066" y="350" width="166" height="130" rx="4"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="1"/>
  <text x="1149" y="420" text-anchor="middle" font-size="11" fill="#1b5e20">Container C</text>

  <!-- Pod 3 (spanning) -->
  <rect x="835" y="516" width="413" height="140" rx="6"
        fill="white" stroke="#2d7d32" stroke-width="1.5"/>
  <text x="1041" y="540" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7d32">Pod</text>
  <rect x="851" y="550" width="180" height="85" rx="4"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="1"/>
  <text x="941" y="596" text-anchor="middle" font-size="11" fill="#1b5e20">Container D</text>
  <rect x="1048" y="550" width="180" height="85" rx="4"
        fill="#E8F5E9" stroke="#2d7d32" stroke-width="1"/>
  <text x="1138" y="596" text-anchor="middle" font-size="11" fill="#1b5e20">Container E</text>

  <!-- ===================================================
       CROSS ARROW: kube-apiserver <-> worker kubelet
       =================================================== -->
  <!-- Horizontal line from right edge of apiserver to left edge of worker kubelet -->
  <line x1="778" y1="162" x2="824" y2="140" stroke="#326CE5" stroke-width="2.5"
        marker-end="url(#aB)" marker-start="url(#aBs)"/>
  <!-- Label background -->
  <rect x="769" y="108" width="68" height="26" rx="3" fill="white" opacity="0.88"/>
  <text x="803" y="121" text-anchor="middle" font-size="9" fill="#326CE5" font-weight="bold">HTTPS API</text>
  <text x="803" y="131" text-anchor="middle" font-size="8.5" fill="#326CE5">calls</text>

  <!-- Line from apiserver right edge -->
  <line x1="490" y1="189" x2="778" y2="162" stroke="#326CE5" stroke-width="2" stroke-dasharray="5,3"/>

</svg>
