services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/kubernetes-learning:latest
    stdin_open: true
    tty: true
    volumes:
      # ── Workspace ─────────────────────────────────────────────────────────
      - type: bind
        source: ${WORKSPACE_DIR:-..}
        target: /workspace

      # ── Audio Bridging for Claude Voice Support ───────────────────────────────────────────────────
      # Uses TCP to reach PulseAudio on the macOS host.
      # Install pulseaudio with:
      #   brew install pulseaudio
      # Start PulseAudio on the host with:
      #   pulseaudio --load=module-native-protocol-tcp auth-ip-acl=0.0.0.0/0 auth-anonymous=1 port=4714 --exit-idle-time=-1 --daemon

      - type: bind
        source: ${HOST_ROOT:-../.root}/.asoundrc
        target: /root/.asoundrc
        read_only: true

      # ── Persisted configuration (all live under .root/ on the host) ───────
      # SSH keys — read-only; manage keys only on the host
      - type: bind
        source: ${HOST_ROOT:-../.root}/.ssh
        target: /root/.ssh
        read_only: true

      # Claude: config file + memory
      - type: bind
        source: ${HOST_ROOT:-../.root}/.claude
        target: /root/.claude

      # Gemini: config file + memory
      - type: bind
        source: ${HOST_ROOT:-../.root}/.gemini
        target: /root/.gemini

      # Jules: config file + memory
      - type: bind
        source: ${HOST_ROOT:-../.root}/.config/google-jules
        target: /root/.config/google-jules

      # Git: global config + credentials helper store
      - type: bind
        source: ${HOST_ROOT:-../.root}/.config/git
        target: /root/.config/git

    environment:
      - TZ=Europe/Berlin
      - LANG=en_US.UTF-8
      - COLORTERM=truecolor
      - TERM=xterm-256color
      # Tell git to look for its config in XDG location (matches mount above)
      - GIT_CONFIG_GLOBAL=/root/.config/git/config
      # --- Audio Config ---
      - PULSE_SERVER=tcp:host.docker.internal:4714
      - AUDIODRIVER=pulseaudio
      
    working_dir: /workspace

volumes: {}
